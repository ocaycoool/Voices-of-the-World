<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a Story</title>
    <link rel="stylesheet" href="shared-page.css">
    <link rel="stylesheet" href="create-story.css">
    <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cinzel">

</head>
<body>

    <div id="page-header">
        <div id="logo-container">
            <a href="index.html">
                <img id="logo" src="imgs/Screenshot 2026-03-26 at 10,23,32 AM-Picsart-BackgroundRemover.png">
            </a>
        </div>
        <div id="navigation">
            <button id="mission" onclick="window.location.href='mission.html'">My Mission</button>
            <button id="create-story" onclick="window.location.href='create-story.html'">Create a Story!</button>
            <button id="all-stories" onclick="window.location.href='all-stories.html'">All Stories</button>
            <button id="contact" onclick="window.location.href='contact.html'">Contact</button>
        </div>
        
    </div>

    <div id="page-body">
        <h1 id="page-title">Create A Story</h1>
    </div>
    
    <div id="story-form-container">
        <form id="story-form">
            <input type="text" id="name" name="name" placeholder="Name:">
            <textarea id="story" name="story" rows="5" cols="40" placeholder="Type here..."></textarea>
            <br><br>
            <button type="submit">Submit</button>
        </form>
    </div>
     <script src="create-story.js"></script>
</body>
</html>
